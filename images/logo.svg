<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="roofGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e74c3c"/>
      <stop offset="50%" style="stop-color:#c0392b"/>
      <stop offset="100%" style="stop-color:#e74c3c"/>
    </linearGradient>
    <linearGradient id="wallGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f5e6d3"/>
      <stop offset="100%" style="stop-color:#e8d5b7"/>
    </linearGradient>
    <linearGradient id="counterGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8B4513"/>
      <stop offset="100%" style="stop-color:#6B3410"/>
    </linearGradient>
    <linearGradient id="sunGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f1c40f"/>
      <stop offset="100%" style="stop-color:#f39c12"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="rgba(0,0,0,0.2)"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="200" cy="200" r="190" fill="#00703C" opacity="0.95"/>
  <circle cx="200" cy="200" r="175" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="3" stroke-dasharray="8,6"/>

  <!-- Sun rays (Philippine sun inspired) -->
  <g transform="translate(200, 80)">
    <circle cx="0" cy="0" r="22" fill="url(#sunGrad)"/>
    <g fill="#f1c40f" opacity="0.9">
      <polygon points="0,-32 3,-25 -3,-25"/>
      <polygon points="0,32 3,25 -3,25"/>
      <polygon points="-32,0 -25,3 -25,-3"/>
      <polygon points="32,0 25,3 25,-3"/>
      <polygon points="-22,-22 -17,-17 -20,-14"/>
      <polygon points="22,-22 17,-17 20,-14"/>
      <polygon points="-22,22 -17,17 -14,20"/>
      <polygon points="22,22 17,17 14,20"/>
    </g>
  </g>

  <!-- Store building -->
  <g filter="url(#shadow)">
    <!-- Main wall -->
    <rect x="80" y="150" width="240" height="140" rx="4" fill="url(#wallGrad)"/>

    <!-- Roof - nipa style with stripes -->
    <polygon points="60,155 200,110 340,155" fill="url(#roofGrad)"/>
    <polygon points="70,155 200,115 330,155" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
    <!-- Roof detail lines (nipa texture) -->
    <line x1="100" y1="148" x2="130" y2="135" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
    <line x1="150" y1="140" x2="175" y2="128" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
    <line x1="225" y1="128" x2="250" y2="140" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
    <line x1="270" y1="135" x2="300" y2="148" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>

    <!-- Counter/window -->
    <rect x="100" y="175" width="200" height="70" rx="3" fill="url(#counterGrad)"/>
    <rect x="105" y="180" width="190" height="55" rx="2" fill="#4a2a0a"/>

    <!-- Products on shelves (colorful items) -->
    <!-- Top shelf items -->
    <rect x="112" y="185" width="14" height="20" rx="2" fill="#e74c3c"/>
    <rect x="130" y="188" width="12" height="17" rx="2" fill="#3498db"/>
    <rect x="146" y="185" width="14" height="20" rx="2" fill="#f1c40f"/>
    <rect x="164" y="187" width="11" height="18" rx="2" fill="#2ecc71"/>
    <rect x="179" y="185" width="14" height="20" rx="2" fill="#e67e22"/>
    <rect x="197" y="188" width="12" height="17" rx="2" fill="#9b59b6"/>
    <rect x="213" y="185" width="14" height="20" rx="2" fill="#1abc9c"/>
    <rect x="231" y="187" width="12" height="18" rx="2" fill="#e74c3c"/>
    <rect x="247" y="185" width="14" height="20" rx="2" fill="#3498db"/>
    <rect x="265" y="188" width="12" height="17" rx="2" fill="#f39c12"/>
    <rect x="280" y="185" width="10" height="20" rx="2" fill="#e91e63"/>

    <!-- Bottom shelf items -->
    <rect x="112" y="210" width="16" height="22" rx="3" fill="#27ae60"/>
    <rect x="132" y="212" width="14" height="20" rx="3" fill="#e74c3c"/>
    <rect x="150" y="210" width="16" height="22" rx="3" fill="#2980b9"/>
    <rect x="170" y="213" width="13" height="19" rx="3" fill="#f1c40f"/>
    <rect x="187" y="210" width="16" height="22" rx="3" fill="#8e44ad"/>
    <rect x="207" y="212" width="14" height="20" rx="3" fill="#d35400"/>
    <rect x="225" y="210" width="16" height="22" rx="3" fill="#16a085"/>
    <rect x="245" y="213" width="13" height="19" rx="3" fill="#c0392b"/>
    <rect x="262" y="210" width="16" height="22" rx="3" fill="#2ecc71"/>
    <rect x="281" y="212" width="10" height="20" rx="3" fill="#3498db"/>

    <!-- Counter top surface -->
    <rect x="90" y="248" width="220" height="12" rx="3" fill="#A0522D"/>
    <rect x="90" y="248" width="220" height="4" rx="2" fill="#B8733D"/>

    <!-- Window opening hint -->
    <rect x="100" y="260" width="200" height="30" rx="2" fill="url(#wallGrad)" opacity="0.8"/>
  </g>

  <!-- Banderitas (Filipino paper flags) -->
  <g opacity="0.9">
    <line x1="55" y1="108" x2="345" y2="108" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
    <!-- Flag triangles -->
    <polygon points="70,108 80,108 75,120" fill="#e74c3c"/>
    <polygon points="90,108 100,108 95,120" fill="#3498db"/>
    <polygon points="110,108 120,108 115,120" fill="#f1c40f"/>
    <polygon points="130,108 140,108 135,120" fill="#2ecc71"/>
    <polygon points="150,108 160,108 155,120" fill="#e67e22"/>
    <polygon points="170,108 180,108 175,120" fill="#9b59b6"/>
    <polygon points="190,108 200,108 195,120" fill="#e74c3c"/>
    <polygon points="210,108 220,108 215,120" fill="#1abc9c"/>
    <polygon points="230,108 240,108 235,120" fill="#f1c40f"/>
    <polygon points="250,108 260,108 255,120" fill="#3498db"/>
    <polygon points="270,108 280,108 275,120" fill="#e67e22"/>
    <polygon points="290,108 300,108 295,120" fill="#2ecc71"/>
    <polygon points="310,108 320,108 315,120" fill="#9b59b6"/>
    <polygon points="330,108 340,108 335,120" fill="#e74c3c"/>
  </g>

  <!-- Store name text -->
  <text x="200" y="320" text-anchor="middle" font-family="'Fredoka', 'Arial Rounded MT Bold', sans-serif" font-weight="700" font-size="30" fill="white" letter-spacing="1">TESS</text>
  <text x="200" y="348" text-anchor="middle" font-family="'Fredoka', 'Arial Rounded MT Bold', sans-serif" font-weight="600" font-size="16" fill="rgba(255,255,255,0.9)" letter-spacing="3">SARI-SARI STORE</text>

  <!-- Small decorative line -->
  <line x1="140" y1="355" x2="260" y2="355" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
  <text x="200" y="372" text-anchor="middle" font-family="'Poppins', sans-serif" font-weight="400" font-size="10" fill="rgba(255,255,255,0.6)" letter-spacing="2">SAN RAFAEL, BULACAN</text>
</svg>
