<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Credits / Utang - Sari-Sari Store POS</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Sidebar -->
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="store-logo">
        <i class="bi bi-shop"></i>
      </div>
      <h5 class="store-name">Sari-Sari Store</h5>
      <small class="store-tagline">Inventory & Credit System</small>
    </div>
    <ul class="sidebar-nav">
      <li class="nav-item">
        <a href="index.html"><i class="bi bi-grid-1x2-fill"></i> Dashboard</a>
      </li>
      <li class="nav-item">
        <a href="inventory.html"><i class="bi bi-box-seam-fill"></i> Inventory</a>
      </li>
      <li class="nav-item active">
        <a href="credits.html"><i class="bi bi-credit-card-fill"></i> Credits / Utang</a>
      </li>
      <li class="nav-item">
        <a href="sales.html"><i class="bi bi-cart-fill"></i> New Sale</a>
      </li>
      <li class="nav-item">
        <a href="orders.html"><i class="bi bi-bag-check-fill"></i> Pickup Orders</a>
      </li>
    </ul>
    <div class="sidebar-footer">
      <div class="seven-stripe"></div>
      <small>&copy; 2025 Sari-Sari Store POS</small>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="main-content">
    <div class="topbar">
      <button class="btn btn-link sidebar-toggle d-md-none" onclick="toggleSidebar()">
        <i class="bi bi-list fs-4"></i>
      </button>
      <h4 class="page-title"><i class="bi bi-credit-card-fill"></i> Credits / Utang</h4>
      <div class="topbar-right">
        <button class="btn btn-seven-orange me-2" data-bs-toggle="modal" data-bs-target="#customerModal" onclick="openAddCustomer()">
          <i class="bi bi-person-plus"></i> Add Customer
        </button>
        <button class="btn btn-seven-green" data-bs-toggle="modal" data-bs-target="#creditModal" onclick="openAddCredit()">
          <i class="bi bi-plus-circle"></i> Add Utang
        </button>
      </div>
    </div>

    <!-- Summary Cards -->
    <div class="row g-3 mb-4">
      <div class="col-6 col-lg-3">
        <div class="stat-card stat-red">
          <div class="stat-icon"><i class="bi bi-cash-coin"></i></div>
          <div class="stat-info">
            <span class="stat-value" id="totalUnpaid">₱0</span>
            <span class="stat-label">Total Unpaid</span>
          </div>
        </div>
      </div>
      <div class="col-6 col-lg-3">
        <div class="stat-card stat-green">
          <div class="stat-icon"><i class="bi bi-check-circle-fill"></i></div>
          <div class="stat-info">
            <span class="stat-value" id="totalPaid">₱0</span>
            <span class="stat-label">Total Paid</span>
          </div>
        </div>
      </div>
      <div class="col-6 col-lg-3">
        <div class="stat-card stat-orange">
          <div class="stat-icon"><i class="bi bi-people-fill"></i></div>
          <div class="stat-info">
            <span class="stat-value" id="totalCustomers">0</span>
            <span class="stat-label">Customers</span>
          </div>
        </div>
      </div>
      <div class="col-6 col-lg-3">
        <div class="stat-card stat-green-alt">
          <div class="stat-icon"><i class="bi bi-person-check-fill"></i></div>
          <div class="stat-info">
            <span class="stat-value" id="withUtang">0</span>
            <span class="stat-label">With Utang</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Search & Filter -->
    <div class="row g-3 mb-4">
      <div class="col-md-4">
        <div class="input-group">
          <span class="input-group-text bg-seven-green text-white"><i class="bi bi-search"></i></span>
          <input type="text" class="form-control" id="searchCustomer" placeholder="Search customer..." oninput="filterCredits()">
        </div>
      </div>
      <div class="col-md-3">
        <select class="form-select" id="filterPaid" onchange="filterCredits()">
          <option value="">All Status</option>
          <option value="unpaid">Unpaid</option>
          <option value="paid">Paid</option>
        </select>
      </div>
    </div>

    <!-- Customers with Credits -->
    <div id="customerCreditsList">
      <div class="text-center text-muted py-4">Loading...</div>
    </div>
  </main>

  <!-- Add/Edit Customer Modal -->
  <div class="modal fade" id="customerModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content seven-modal">
        <div class="modal-header">
          <h5 class="modal-title" id="customerModalTitle">Add Customer</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <form id="customerForm">
            <input type="hidden" id="customerId">
            <div class="mb-3">
              <label class="form-label">Full Name</label>
              <input type="text" class="form-control" id="customerName" required placeholder="e.g. Aling Maria">
            </div>
            <div class="mb-3">
              <label class="form-label">Address</label>
              <input type="text" class="form-control" id="customerAddress" placeholder="e.g. Block 1 Lot 5">
            </div>
            <div class="mb-3">
              <label class="form-label">Phone</label>
              <input type="text" class="form-control" id="customerPhone" placeholder="e.g. 09171234567">
            </div>
            <div class="mb-3">
              <label class="form-label">Notes</label>
              <textarea class="form-control" id="customerNotes" rows="2" placeholder="Optional notes..."></textarea>
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="button" class="btn btn-seven-green" onclick="saveCustomer()">
            <i class="bi bi-check-circle"></i> Save
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Add Credit / Utang Modal -->
  <div class="modal fade" id="creditModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content seven-modal">
        <div class="modal-header">
          <h5 class="modal-title" id="creditModalTitle">Add Utang</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <form id="creditForm">
            <input type="hidden" id="creditId">
            <div class="mb-3">
              <label class="form-label">Customer</label>
              <select class="form-select" id="creditCustomer" required>
                <option value="">Select customer...</option>
              </select>
            </div>
            <div class="mb-3">
              <label class="form-label">Amount (₱)</label>
              <input type="number" class="form-control" id="creditAmount" step="0.50" min="1" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Description</label>
              <input type="text" class="form-control" id="creditDescription" placeholder="e.g. 2 Lucky Me, 1 Coke">
            </div>
            <div class="row g-3 mb-3">
              <div class="col-6">
                <label class="form-label">Credit Date</label>
                <input type="date" class="form-control" id="creditDate">
              </div>
              <div class="col-6">
                <label class="form-label">Due Date (optional)</label>
                <input type="date" class="form-control" id="creditDueDate">
              </div>
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="button" class="btn btn-seven-green" onclick="saveCredit()">
            <i class="bi bi-check-circle"></i> Save Utang
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Payment Modal -->
  <div class="modal fade" id="paymentModal" tabindex="-1">
    <div class="modal-dialog modal-sm">
      <div class="modal-content seven-modal">
        <div class="modal-header">
          <h5 class="modal-title">Record Payment</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <p class="fw-semibold" id="paymentCreditDesc"></p>
          <p class="text-muted small">Remaining: <span id="paymentRemaining" class="text-danger fw-bold"></span></p>
          <input type="hidden" id="paymentCreditId">
          <input type="hidden" id="paymentCreditTotal">
          <input type="hidden" id="paymentPaidSoFar">
          <div class="mb-3">
            <label class="form-label">Payment Amount (₱)</label>
            <input type="number" class="form-control" id="paymentAmount" step="0.50" min="1" required>
          </div>
          <div class="form-check mb-3">
            <input class="form-check-input" type="checkbox" id="payFullCheck" onchange="togglePayFull()">
            <label class="form-check-label" for="payFullCheck">Pay full remaining balance</label>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="button" class="btn btn-seven-green" onclick="recordPayment()">
            <i class="bi bi-cash"></i> Record Payment
          </button>
        </div>
      </div>
    </div>
  </div>

  <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/app.js"></script>
  <script src="js/credits.js"></script>
</body>
</html>
