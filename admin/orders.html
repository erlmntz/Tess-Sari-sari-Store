<!DOCTYPE html>
<html lang="tl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mga Order - Tess Sari-Sari Store</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="icon" type="image/svg+xml" href="../images/logo-icon.svg">
</head>
<body>

  <!-- Sidebar -->
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="store-logo">
        <img src="../images/logo-icon.svg" alt="Tess Sari-Sari Store" style="width:100%;height:100%;object-fit:contain;border-radius:16px;">
      </div>
      <h5 class="store-name">Tess Sari-Sari Store</h5>
      <small class="store-tagline">Sistema ng Tindahan</small>
    </div>
    <ul class="sidebar-nav">
      <li class="nav-item">
        <a href="/admin/"><i class="bi bi-grid-1x2-fill"></i> <span class="nav-label">Buod</span></a>
      </li>
      <li class="nav-item">
        <a href="/admin/inventory.html"><i class="bi bi-box-seam-fill"></i> <span class="nav-label">Imbentaryo</span></a>
      </li>
      <li class="nav-item">
        <a href="/admin/credits.html"><i class="bi bi-credit-card-fill"></i> <span class="nav-label">Utang</span></a>
      </li>
      <li class="nav-item">
        <a href="/admin/sales.html"><i class="bi bi-cart-fill"></i> <span class="nav-label">Bagong Benta</span></a>
      </li>
      <li class="nav-item active">
        <a href="/admin/orders.html"><i class="bi bi-bag-check-fill"></i> <span class="nav-label">Mga Order</span></a>
      </li>
      <li class="nav-item">
        <a href="/" target="_blank"><i class="bi bi-shop"></i> <span class="nav-label">Tingnan Tindahan</span></a>
      </li>
    </ul>
    <div class="sidebar-footer">
      <div class="seven-stripe"></div>
      <small>&copy; 2025 Tess Sari-Sari Store</small>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="main-content">
    <div class="topbar">
      <button class="btn btn-link sidebar-toggle" onclick="toggleSidebar()">
        <i class="bi bi-list fs-4"></i>
      </button>
      <h4 class="page-title"><i class="bi bi-bag-check-fill"></i> Mga Pickup Order</h4>
      <div class="topbar-right">
        <button class="btn btn-seven-green" onclick="loadOrders()">
          <i class="bi bi-arrow-clockwise"></i> I-refresh
        </button>
      </div>
    </div>

    <!-- Stats -->
    <div class="row g-3 mb-4">
      <div class="col-6 col-lg-3">
        <div class="stat-card stat-orange">
          <div class="stat-icon"><i class="bi bi-clock-fill"></i></div>
          <div class="stat-info">
            <span class="stat-value" id="pendingCount">0</span>
            <span class="stat-label">Naghihintay</span>
          </div>
        </div>
      </div>
      <div class="col-6 col-lg-3">
        <div class="stat-card stat-green">
          <div class="stat-icon"><i class="bi bi-check-circle-fill"></i></div>
          <div class="stat-info">
            <span class="stat-value" id="completedCount">0</span>
            <span class="stat-label">Tapos na</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Filter -->
    <div class="row g-3 mb-4">
      <div class="col-md-3">
        <select class="form-select" id="filterOrderStatus" onchange="loadOrders()">
          <option value="">Lahat ng Order</option>
          <option value="pending" selected>Naghihintay</option>
          <option value="preparing">Inihahanda</option>
          <option value="ready">Handa na</option>
          <option value="completed">Tapos na</option>
          <option value="cancelled">Kinansela</option>
        </select>
      </div>
    </div>

    <!-- Orders List -->
    <div id="ordersList">
      <div class="text-center text-muted py-4">Nag-loload ng mga order...</div>
    </div>
  </main>

  <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabase-config.js"></script>
  <script src="../js/app.js"></script>
  <script src="../js/orders.js"></script>
</body>
</html>
