<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New Sale - Sari-Sari Store POS</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

  <!-- Sidebar -->
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="store-logo">
        <i class="bi bi-shop"></i>
      </div>
      <h5 class="store-name">Sari-Sari Store</h5>
      <small class="store-tagline">Inventory & Credit System</small>
    </div>
    <ul class="sidebar-nav">
      <li class="nav-item">
        <a href="index.html"><i class="bi bi-grid-1x2-fill"></i> Dashboard</a>
      </li>
      <li class="nav-item">
        <a href="inventory.html"><i class="bi bi-box-seam-fill"></i> Inventory</a>
      </li>
      <li class="nav-item">
        <a href="credits.html"><i class="bi bi-credit-card-fill"></i> Credits / Utang</a>
      </li>
      <li class="nav-item active">
        <a href="sales.html"><i class="bi bi-cart-fill"></i> New Sale</a>
      </li>
      <li class="nav-item">
        <a href="orders.html"><i class="bi bi-bag-check-fill"></i> Pickup Orders</a>
      </li>
      <li class="nav-item">
        <a href="../index.html" target="_blank"><i class="bi bi-shop"></i> View Store</a>
      </li>
    </ul>
    <div class="sidebar-footer">
      <div class="seven-stripe"></div>
      <small>&copy; 2025 Sari-Sari Store POS</small>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="main-content">
    <div class="topbar">
      <button class="btn btn-link sidebar-toggle d-md-none" onclick="toggleSidebar()">
        <i class="bi bi-list fs-4"></i>
      </button>
      <h4 class="page-title"><i class="bi bi-cart-fill"></i> New Sale</h4>
      <div class="topbar-right">
        <span class="badge bg-seven-green" id="currentDate"></span>
      </div>
    </div>

    <div class="row g-4">
      <!-- Product Selection -->
      <div class="col-lg-7">
        <div class="card seven-card">
          <div class="card-header seven-card-header">
            <i class="bi bi-search"></i> Select Products
          </div>
          <div class="card-body">
            <div class="input-group mb-3">
              <span class="input-group-text bg-seven-green text-white"><i class="bi bi-search"></i></span>
              <input type="text" class="form-control" id="searchSaleProduct" placeholder="Search product..." oninput="searchProducts()">
            </div>
            <div class="product-grid" id="productGrid">
              <div class="text-center text-muted py-4">Loading products...</div>
            </div>
          </div>
        </div>
      </div>

      <!-- Cart -->
      <div class="col-lg-5">
        <div class="card seven-card">
          <div class="card-header seven-card-header">
            <i class="bi bi-cart3"></i> Cart
          </div>
          <div class="card-body">
            <div id="cartItems" class="cart-items">
              <div class="text-center text-muted py-3">No items in cart</div>
            </div>
            <hr>
            <div class="d-flex justify-content-between fw-bold fs-5 mb-3">
              <span>Total:</span>
              <span class="text-seven-green" id="cartTotal">₱0.00</span>
            </div>

            <!-- Payment Type -->
            <div class="mb-3">
              <label class="form-label fw-semibold">Payment Type</label>
              <div class="btn-group w-100" role="group">
                <input type="radio" class="btn-check" name="paymentType" id="payCash" value="cash" checked>
                <label class="btn btn-outline-success" for="payCash"><i class="bi bi-cash"></i> Cash</label>
                <input type="radio" class="btn-check" name="paymentType" id="payCredit" value="credit">
                <label class="btn btn-outline-danger" for="payCredit"><i class="bi bi-credit-card"></i> Utang</label>
              </div>
            </div>

            <!-- Customer Selection (for credit) -->
            <div class="mb-3 d-none" id="creditCustomerSelect">
              <label class="form-label">Customer</label>
              <select class="form-select" id="saleCustomer">
                <option value="">Select customer...</option>
              </select>
            </div>

            <button class="btn btn-seven-green w-100 btn-lg" onclick="completeSale()" id="completeSaleBtn" disabled>
              <i class="bi bi-check-circle-fill"></i> Complete Sale
            </button>
          </div>
        </div>
      </div>
    </div>
  </main>

  <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabase-config.js"></script>
  <script src="../js/app.js"></script>
  <script src="../js/sales.js"></script>
</body>
</html>
