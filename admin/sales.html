<!DOCTYPE html>
<html lang="tl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bagong Benta - Tess Sari-Sari Store</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="icon" type="image/svg+xml" href="../images/logo-icon.svg">
</head>
<body>

  <!-- Sidebar -->
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="store-logo">
        <img src="../images/logo-icon.svg" alt="Tess Sari-Sari Store" style="width:100%;height:100%;object-fit:contain;border-radius:16px;">
      </div>
      <h5 class="store-name">Tess Sari-Sari Store</h5>
      <small class="store-tagline">Sistema ng Tindahan</small>
    </div>
    <ul class="sidebar-nav">
      <li class="nav-item">
        <a href="/admin/"><i class="bi bi-grid-1x2-fill"></i> <span class="nav-label">Buod</span></a>
      </li>
      <li class="nav-item">
        <a href="/admin/inventory.html"><i class="bi bi-box-seam-fill"></i> <span class="nav-label">Imbentaryo</span></a>
      </li>
      <li class="nav-item">
        <a href="/admin/credits.html"><i class="bi bi-credit-card-fill"></i> <span class="nav-label">Utang</span></a>
      </li>
      <li class="nav-item active">
        <a href="/admin/sales.html"><i class="bi bi-cart-fill"></i> <span class="nav-label">Bagong Benta</span></a>
      </li>
      <li class="nav-item">
        <a href="/admin/orders.html"><i class="bi bi-bag-check-fill"></i> <span class="nav-label">Mga Order</span></a>
      </li>
      <li class="nav-item">
        <a href="/" target="_blank"><i class="bi bi-shop"></i> <span class="nav-label">Tingnan Tindahan</span></a>
      </li>
    </ul>
    <div class="sidebar-footer">
      <div class="seven-stripe"></div>
      <small>&copy; 2025 Tess Sari-Sari Store</small>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="main-content">
    <div class="topbar">
      <button class="btn btn-link sidebar-toggle" onclick="toggleSidebar()">
        <i class="bi bi-list fs-4"></i>
      </button>
      <h4 class="page-title"><i class="bi bi-cart-fill"></i> Bagong Benta</h4>
      <div class="topbar-right">
        <span class="badge bg-seven-green" id="currentDate"></span>
      </div>
    </div>

    <div class="row g-4">
      <!-- Product Selection -->
      <div class="col-lg-7">
        <div class="card seven-card">
          <div class="card-header seven-card-header">
            <i class="bi bi-search"></i> Pumili ng Produkto
          </div>
          <div class="card-body">
            <div class="input-group mb-3">
              <span class="input-group-text bg-seven-green text-white"><i class="bi bi-search"></i></span>
              <input type="text" class="form-control" id="searchSaleProduct" placeholder="Maghanap ng produkto..." oninput="searchProducts()">
            </div>
            <div class="product-grid" id="productGrid">
              <div class="text-center text-muted py-4">Nag-loload ng produkto...</div>
            </div>
          </div>
        </div>
      </div>

      <!-- Cart -->
      <div class="col-lg-5">
        <div class="card seven-card">
          <div class="card-header seven-card-header">
            <i class="bi bi-cart3"></i> Cart
          </div>
          <div class="card-body">
            <div id="cartItems" class="cart-items">
              <div class="text-center text-muted py-3">Walang laman ang cart</div>
            </div>
            <hr>
            <div class="d-flex justify-content-between fw-bold fs-5 mb-3">
              <span>Kabuuan:</span>
              <span class="text-seven-green" id="cartTotal">₱0.00</span>
            </div>

            <!-- Uri ng Bayad -->
            <div class="mb-3">
              <label class="form-label fw-semibold">Uri ng Bayad</label>
              <div class="btn-group w-100" role="group">
                <input type="radio" class="btn-check" name="paymentType" id="payCash" value="cash" checked>
                <label class="btn btn-outline-success" for="payCash"><i class="bi bi-cash"></i> Cash</label>
                <input type="radio" class="btn-check" name="paymentType" id="payCredit" value="credit">
                <label class="btn btn-outline-danger" for="payCredit"><i class="bi bi-credit-card"></i> Utang</label>
              </div>
            </div>

            <!-- Customer Selection (for credit) -->
            <div class="mb-3 d-none" id="creditCustomerSelect">
              <label class="form-label">Customer</label>
              <select class="form-select" id="saleCustomer">
                <option value="">Pumili ng customer...</option>
              </select>
            </div>

            <button class="btn btn-seven-green w-100 btn-lg" onclick="completeSale()" id="completeSaleBtn" disabled>
              <i class="bi bi-check-circle-fill"></i> Tapusin ang Benta
            </button>
          </div>
        </div>
      </div>
    </div>
  </main>

  <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabase-config.js"></script>
  <script src="../js/app.js"></script>
  <script src="../js/sales.js"></script>
</body>
</html>
