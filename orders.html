<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pickup Orders - Sari-Sari Store POS</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Sidebar -->
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="store-logo">
        <i class="bi bi-shop"></i>
      </div>
      <h5 class="store-name">Sari-Sari Store</h5>
      <small class="store-tagline">Inventory & Credit System</small>
    </div>
    <ul class="sidebar-nav">
      <li class="nav-item">
        <a href="index.html"><i class="bi bi-grid-1x2-fill"></i> Dashboard</a>
      </li>
      <li class="nav-item">
        <a href="inventory.html"><i class="bi bi-box-seam-fill"></i> Inventory</a>
      </li>
      <li class="nav-item">
        <a href="credits.html"><i class="bi bi-credit-card-fill"></i> Credits / Utang</a>
      </li>
      <li class="nav-item">
        <a href="sales.html"><i class="bi bi-cart-fill"></i> New Sale</a>
      </li>
      <li class="nav-item active">
        <a href="orders.html"><i class="bi bi-bag-check-fill"></i> Pickup Orders</a>
      </li>
    </ul>
    <div class="sidebar-footer">
      <div class="seven-stripe"></div>
      <small>&copy; 2025 Sari-Sari Store POS</small>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="main-content">
    <div class="topbar">
      <button class="btn btn-link sidebar-toggle d-md-none" onclick="toggleSidebar()">
        <i class="bi bi-list fs-4"></i>
      </button>
      <h4 class="page-title"><i class="bi bi-bag-check-fill"></i> Pickup Orders</h4>
      <div class="topbar-right">
        <button class="btn btn-seven-green" onclick="loadOrders()">
          <i class="bi bi-arrow-clockwise"></i> Refresh
        </button>
      </div>
    </div>

    <!-- Stats -->
    <div class="row g-3 mb-4">
      <div class="col-6 col-lg-3">
        <div class="stat-card stat-orange">
          <div class="stat-icon"><i class="bi bi-clock-fill"></i></div>
          <div class="stat-info">
            <span class="stat-value" id="pendingCount">0</span>
            <span class="stat-label">Pending</span>
          </div>
        </div>
      </div>
      <div class="col-6 col-lg-3">
        <div class="stat-card stat-green">
          <div class="stat-icon"><i class="bi bi-check-circle-fill"></i></div>
          <div class="stat-info">
            <span class="stat-value" id="completedCount">0</span>
            <span class="stat-label">Completed</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Filter -->
    <div class="row g-3 mb-4">
      <div class="col-md-3">
        <select class="form-select" id="filterOrderStatus" onchange="loadOrders()">
          <option value="">All Orders</option>
          <option value="pending" selected>Pending</option>
          <option value="preparing">Preparing</option>
          <option value="ready">Ready for Pickup</option>
          <option value="completed">Completed</option>
          <option value="cancelled">Cancelled</option>
        </select>
      </div>
    </div>

    <!-- Orders List -->
    <div id="ordersList">
      <div class="text-center text-muted py-4">Loading orders...</div>
    </div>
  </main>

  <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/app.js"></script>
  <script src="js/orders.js"></script>
</body>
</html>
